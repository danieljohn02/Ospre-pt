[[headers]]
  for = "/*"
  [headers.values]
    X-DNS-Prefetch-Control = "on"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com; frame-src https://www.google.com https://maps.google.com; connect-src 'self' https://netlify.com https://*.netlify.com; frame-ancestors 'self';"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Clean URLs for exported pages (.html) ---
[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# --- 301 redirects from old site URLs (preserve SEO / link equity) ---
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about-us.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/our-services.html"
  to = "/services"
  status = 301

[[redirects]]
  from = "/our-team.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/team-member-profile.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/contacts.html"
  to = "/#contact"
  status = 301

[[redirects]]
  from = "/careers.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog-post.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"

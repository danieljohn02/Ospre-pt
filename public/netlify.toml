[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Clean URLs for exported pages (.html) ---
[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# --- 301 redirects from old site URLs (preserve SEO / link equity) ---
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about-us.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/our-services.html"
  to = "/services"
  status = 301

[[redirects]]
  from = "/our-team.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/team-member-profile.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/contacts.html"
  to = "/#contact"
  status = 301

[[redirects]]
  from = "/careers.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog-post.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/coming-soon.html"
  to = "/"
  status = 301

# --- SPA fallback (keep last) ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
